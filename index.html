<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PVP STAR - ARENA</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --tg-theme-bg-color: #0e1621;
            --accent-color: #2481cc;
            --gold-color: #ffcc00;
        }

        body {
            background: radial-gradient(circle at top, #1b2735 0%, #090a0f 100%);
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Карточка профиля */
        .app-container {
            width: 90%;
            max-width: 400px;
            margin-top: 40px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            padding: 20px;
            backdrop-filter: blur(15px);
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        h1 {
            font-size: 24px;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--gold-color);
            text-shadow: 0 0 15px rgba(255, 204, 0, 0.4);
        }

        .user-card {
            margin: 20px 0;
        }

        .avatar {
            width: 80px;
            height: 80px;
            background: var(--accent-color);
            border-radius: 50%;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            border: 3px solid rgba(255,255,255,0.1);
        }

        .username {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        /* Плашка баланса */
        .balance-container {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            padding: 12px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin-top: 10px;
        }

        .balance-amount {
            font-size: 22px;
            color: #4facfe;
            font-weight: 800;
        }

        /* Кнопки */
        .actions {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
        }

        .btn {
            padding: 16px;
            border-radius: 15px;
            border: none;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-play {
            background: linear-gradient(45deg, #00c6ff, #0072ff);
            color: white;
            box-shadow: 0 4px 15px rgba(0, 114, 255, 0.3);
        }

        .btn-play:active {
            transform: scale(0.96);
        }

        .btn-close {
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <h1>Arena Star</h1>
        
        <div class="user-card">
            <div id="user_photo" class="avatar">👤</div>
            <div id="user_name" class="username">Загрузка...</div>
            
            <div class="balance-container">
                <span>Баланс:</span>
                <span id="balance_val" class="balance-amount">0</span>
                <span>💰</span>
            </div>
        </div>

        <div class="actions">
            <button class="btn btn-play" onclick="startGame()">НАЙТИ СОПЕРНИКА</button>
            <button class="btn btn-close" onclick="closeApp()">ВЫЙТИ В МЕНЮ</button>
        </div>
    </div>

    <script>
        // Инициализация Telegram Web App
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand(); // Развернуть на весь экран

        // Получаем данные пользователя
        const user = tg.initDataUnsafe?.user;
        if (user) {
            document.getElementById('user_name').innerText = user.first_name;
            // Если есть фото, можно вывести первую букву имени
            document.getElementById('user_photo').innerText = user.first_name.charAt(0);
        }

        // Читаем баланс из URL (бот пришлет ссылку вида ?bal=500)
        const params = new URLSearchParams(window.location.search);
        const currentBalance = params.get('bal') || '0';
        document.getElementById('balance_val').innerText = currentBalance;

        function startGame() {
            // Здесь будет логика поиска игры
            tg.MainButton.setText("ПОИСК ИГРОКА...").show();
            setTimeout(() => {
                tg.showAlert("Соперники пока спят! Заходи позже.");
                tg.MainButton.hide();
            }, 2000);
        }

        function closeApp() {
            tg.close();
        }
    </script>
</body>
</html>
