<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PVP STAR ARENA</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="header">
        <div id="username" style="font-weight: bold;">Игрок</div>
        <div class="balance-pill">
            <span id="balance_val">0</span> ⭐
        </div>
    </div>

    <div class="content">
        
        <div id="tab-games" class="tab-content active">
            <h2 style="margin-top: 0;">PVP Игры</h2>
            <div class="game-card">
                <div>
                    <div style="font-weight: bold;">Flappy Patrick</div>
                    <div style="font-size: 12px; color: #888;">Ставка: 50 монет</div>
                </div>
                <button class="btn-play" onclick="startMatch('Flappy', 50)">ИГРАТЬ</button>
            </div>
        </div>

        <div id="tab-rating" class="tab-content">
            <h2 style="margin-top: 0;">Рейтинг</h2>
            <p>1. Chornyllya — 13.45 ⭐</p>
            <p>2. Player_X — 10.00 ⭐</p>
        </div>

        <div id="tab-profile" class="tab-content">
            <h2 style="margin-top: 0;">Профиль</h2>
            <p>Ваш Telegram ID: <span id="user_id">---</span></p>
            <button class="btn-play" style="background: #e53935; width: 100%;" onclick="tg.close()">ВЫЙТИ В БОТ</button>
        </div>

    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="switchTab('tab-games', this)">
            <span class="nav-icon">🎮</span>
            <span>Игры</span>
        </div>
        <div class="nav-item" onclick="switchTab('tab-rating', this)">
            <span class="nav-icon">🏆</span>
            <span>Топ</span>
        </div>
        <div class="nav-item" onclick="switchTab('tab-profile', this)">
            <span class="nav-icon">👤</span>
            <span>Профиль</span>
        </div>
    </nav>

    <script>
        // Инициализация Telegram Mini App
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // Данные пользователя
        const user = tg.initDataUnsafe?.user;
        if (user) {
            document.getElementById('username').innerText = user.first_name;
            document.getElementById('user_id').innerText = user.id;
        }

        // Чтение баланса из URL
        const params = new URLSearchParams(window.location.search);
        let currentBalance = parseInt(params.get('bal')) || 0;
        document.getElementById('balance_val').innerText = currentBalance;

        // ФУНКЦИЯ ПЕРЕКЛЮЧЕНИЯ ВКЛАДОК
        function switchTab(tabId, element) {
            // 1. Скрываем все вкладки
            const contents = document.getElementsByClassName('tab-content');
            for (let i = 0; i < contents.length; i++) {
                contents[i].classList.remove('active');
            }

            // 2. Убираем синий цвет у всех кнопок меню
            const navItems = document.getElementsByClassName('nav-item');
            for (let i = 0; i < navItems.length; i++) {
                navItems[i].classList.remove('active');
            }

            // 3. Показываем нужную вкладку и красим кнопку
            document.getElementById(tabId).classList.add('active');
            element.classList.add('active');

            // Легкая вибрация
            tg.HapticFeedback.impactOccurred('light');
        }

        // КНОПКА ИГРАТЬ
        function startMatch(game, cost) {
            if (currentBalance < cost) {
                tg.showAlert("Недостаточно средств для игры!");
            } else {
                tg.showConfirm(`Начать игру в ${game} за ${cost} монет?`, (ok) => {
                    if (ok) {
                        tg.showAlert("Поиск соперника запущен...");
                    }
                });
            }
        }
    </script>
</body>
</html>
