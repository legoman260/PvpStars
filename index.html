<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <style>
        /* БАЗОВЫЙ ТЕХНИЧЕСКИЙ ДИЗАЙН (Заменишь на свой CSS) */
        body { background: #121212; color: white; font-family: sans-serif; margin: 0; padding: 0; }
        
        /* Шапка */
        .header { display: flex; justify-content: space-between; padding: 15px; background: #1e1e1e; border-bottom: 2px solid #333; }
        .balance-box { background: #ffcc00; color: black; padding: 5px 15px; border-radius: 20px; font-weight: bold; }

        /* Контентные зоны */
        .tab-content { display: none; padding: 20px; padding-bottom: 100px; }
        .tab-content.active { display: block; }

        /* Карточка игры */
        .game-card { background: #2a2a2a; border-radius: 15px; margin-bottom: 15px; overflow: hidden; border: 1px solid #444; }
        .game-banner { width: 100%; height: 120px; background: #444; display: flex; align-items: center; justify-content: center; }
        .game-info { padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .btn-play { background: #0088cc; color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; }

        /* Нижнее меню */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: #1e1e1e; display: flex; border-top: 1px solid #333; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 12px; color: #888; cursor: pointer; }
        .nav-item.active { color: #0088cc; font-weight: bold; }
        .nav-icon { font-size: 20px; margin-bottom: 4px; }
    </style>
</head>

        <div id="username">Загрузка...</div>
        <div class="balance-box">⭐ <span id="balance_val">0</span></div>

    <div id="games" class="tab-content active">
        <h2>PVP Игры</h2>
        
        <div class="game-card">

                <button class="btn-play" onclick="startMatch('Flappy Patrick', 50)">ИГРАТЬ</button>
            </div>
        </div>

        <div class="game-card">
            <div class="game-banner">ФОТО JUMP</div>

                <div><strong>Patrick Jump</strong><br><small>Матч: 100 монет</small></div>
                <button class="btn-play" onclick="startMatch('Patrick Jump', 100)">ИГРАТЬ</button>
            </div>
        </div>
    </div>

    <div id="rating" class="tab-content">
        <h2>Топ игроков</h2>
        <p>1. Chornyllya — 13.45 ⭐</p>
        <p>2. Player_2 — 10.00 ⭐</p>
    </div>

    <div id="profile" class="tab-content">
        <h2>Твой профиль</h2>
        <p>ID: <span id="user_id">...</span></p>
        <button class="btn-play" style="background:red;" onclick="tg.close()">ВЫЙТИ</button>
    </div>

    <div class="bottom-nav">

        </div>
        <div class="nav-item" onclick="switchTab('rating', this)">
            <div class="nav-icon">🏆</div><span>Топ</span>
        </div>
        <div class="nav-item" onclick="switchTab('profile', this)">
            <div class="nav-icon">👤</div><span>Профиль</span>
        </div>
    </div>
